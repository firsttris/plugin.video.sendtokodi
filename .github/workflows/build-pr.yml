name: build-pr
on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ['master']
jobs:
  tests:
    uses: ./.github/workflows/reusable-tests.yml
    with:
      upload_coverage: true
      coverage_artifact_name: coverage-report-pr
    secrets: inherit
  build:
    needs: [tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read addon version
        id: addon_version
        run: |
          VERSION=$(python "$GITHUB_WORKSPACE/.github/scripts/read_addon_version.py")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: Build addon
        run: $GITHUB_WORKSPACE/.github/scripts/build-addon.sh ${{ steps.addon_version.outputs.version }}
      - name: Upload Addon-artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Addon-artifacts
          path: "${{ runner.temp }}/*.zip"
